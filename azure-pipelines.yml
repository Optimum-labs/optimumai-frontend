trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'
  pnpmVersion: '10'

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: BuildJob
        displayName: Install, Build & Deploy
        steps:
          - checkout: self
            submodules: true

          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)

          - script: corepack enable && corepack prepare pnpm@$(pnpmVersion) --activate
            displayName: Enable pnpm via corepack

          - script: pnpm install --frozen-lockfile
            displayName: Install dependencies
            env:
              NEXT_PUBLIC_SUPABASE_URL: $(NEXT_PUBLIC_SUPABASE_URL)
              NEXT_PUBLIC_SUPABASE_ANON_KEY: $(NEXT_PUBLIC_SUPABASE_ANON_KEY)

          - script: pnpm build
            displayName: Build Next.js application
            env:
              NEXT_PUBLIC_SUPABASE_URL: $(NEXT_PUBLIC_SUPABASE_URL)
              NEXT_PUBLIC_SUPABASE_ANON_KEY: $(NEXT_PUBLIC_SUPABASE_ANON_KEY)
              SUPABASE_SERVICE_ROLE_KEY: $(SUPABASE_SERVICE_ROLE_KEY)
              DATABASE_URL: $(DATABASE_URL)
              NEXT_PUBLIC_APP_URL: $(NEXT_PUBLIC_APP_URL)
              NEXT_PUBLIC_APP_NAME: OptimumAI

          - task: AzureStaticWebApp@0
            displayName: Deploy to Azure Static Web Apps
            inputs:
              app_location: /
              api_location: ''
              output_location: ''
              skip_app_build: false
            env:
              AZURE_STATIC_WEB_APPS_API_TOKEN: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
              NEXT_PUBLIC_SUPABASE_URL: $(NEXT_PUBLIC_SUPABASE_URL)
              NEXT_PUBLIC_SUPABASE_ANON_KEY: $(NEXT_PUBLIC_SUPABASE_ANON_KEY)
              SUPABASE_SERVICE_ROLE_KEY: $(SUPABASE_SERVICE_ROLE_KEY)
              DATABASE_URL: $(DATABASE_URL)
              NEXT_PUBLIC_APP_URL: $(NEXT_PUBLIC_APP_URL)
              NEXT_PUBLIC_APP_NAME: OptimumAI
              SMTP_HOST: $(SMTP_HOST)
              SMTP_PORT: $(SMTP_PORT)
              SMTP_SECURE: $(SMTP_SECURE)
              SMTP_USER: $(SMTP_USER)
              SMTP_PASS: $(SMTP_PASS)
